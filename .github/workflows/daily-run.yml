name: Daily AI Prompt Run

on:
  # Schedule disabled for testing — enable when ready for production runs.
  # Runs at 02:00 UTC on Mondays and Thursdays.
  # - cron: "0 2 * * 1,4"
  workflow_dispatch: # Manual trigger only

jobs:
  run-prompts:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: runner/package-lock.json

      - name: Install dependencies
        working-directory: runner
        run: npm ci

      - name: Run prompt batch
        working-directory: runner
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npm start
